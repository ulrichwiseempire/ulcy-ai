                    <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULCY AI - Test Beta</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { width: 100%; max-width: 350px; text-align: center; background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        .score { position: absolute; top: 15px; right: 20px; background: #7b61ff; color: white; padding: 5px 12px; border-radius: 15px; font-weight: bold; font-size: 0.8rem; }
        .brand { font-weight: 800; font-size: 1.5rem; color: #7b61ff; margin-bottom: 5px; }
        .sub { color: #888; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 15px; }
        select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 0.9rem; }
        .word-box { background: #f8f9ff; border-radius: 15px; padding: 20px; margin-bottom: 20px; min-height: 80px; border: 1px solid #edf0ff; }
        #display-fr { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; }
        #display-target { color: #7b61ff; font-weight: 600; }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-speak { background: #7b61ff; color: white; }
        .btn-listen { background: #eee; color: #555; }
        .btn-skip { background: transparent; color: #aaa; text-decoration: underline; border: none; font-size: 0.8rem; }
        footer { margin-top: 20px; font-size: 0.8rem; color: #bbb; }
        .wise { color: #7b61ff; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <div class="score">SCORE: <span id="score">0</span></div>
    <div class="brand">ULCY AI</div>
    <div class="sub">Omni Learning Engine</div>
    <select id="lang-select">
        <option value="en-US">🇺🇸 Anglais</option>
        <option value="pt-PT">🇵🇹 Portugais (PT)</option>
        <option value="pt-BR">🇧🇷 Portugais (BR)</option>
        <option value="it-IT">🇮🇹 Italien</option>
        <option value="es-ES">🇪🇸 Espagnol</option>
        <option value="ru-RU">🇷🇺 Russe</option>
        <option value="de-DE">🇩🇪 Allemand</option>
        <option value="zh-CN">🇨🇳 Chinois</option>
    </select>
    <select id="level-select">
        <option value="débutant">Niveau : Débutant</option>
        <option value="intermédiaire">Niveau : Moyen</option>
        <option value="expert">Niveau : Expert</option>
    </select>
    <div class="word-box">
        <div id="display-fr">Chargement...</div>
        <div id="display-target">---</div>
    </div>
    <button class="btn btn-listen" id="btn-listen">🔊 ÉCOUTER</button>
    <button class="btn btn-speak" id="btn-mic">🎙️ PARLER</button>
    <button class="btn-skip" id="btn-skip">Passer la phrase</button>
    <div id="result"></div>
    <footer>Propulsé par <span class="wise">WiseEmpire</span></footer>
</div>
<script>
    const API_KEY = "AIzaSyDHoQ12iizO-BL5mV2P9RkyApfEHcmrFC8";
    let phraseActuelle = { t: "", fr: "" };
    let score = 0;
    const resDiv = document.getElementById('result');
    const selectLang = document.getElementById('lang-select');
    const selectLevel = document.getElementById('level-select');

    async function generer() {
        document.getElementById('display-fr').innerText = "Génération...";
        const langText = selectLang.options[selectLang.selectedIndex].text;
        const prompt = `Phrase courte en ${langText}, niveau ${selectLevel.value}. Thèmes variés. JSON: {"t":"phrase","fr":"traduction"}`;
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const d = await r.json();
            const txt = d.candidates.content.parts.text.replace(/```json|```/g, "").trim();
            phraseActuelle = JSON.parse(txt);
            document.getElementById('display-fr').innerText = phraseActuelle.fr;
            document.getElementById('display-target').innerText = phraseActuelle.t;
        } catch (e) { document.getElementById('display-fr').innerText = "Erreur IA"; }
    }

    document.getElementById('btn-listen').onclick = () => {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(phraseActuelle.t);
        u.lang = selectLang.value;
        window.speechSynthesis.speak(u);
    };

    document.getElementById('btn-mic').onclick = () => {
        const Reco = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Reco) return alert("Micro non supporté");
        const r = new Reco(); r.lang = selectLang.value;
        r.onresult = (e) => {
            const dit = e.results.transcript.toLowerCase();
            if (dit.includes(phraseActuelle.t.toLowerCase().replace(/[?.!,]/g, ''))) {
                score += 10; document.getElementById('score').innerText = score;
                generer();
            } else { resDiv.innerText = "Réessaie !"; }
        };
        r.start();
    };

    document.getElementById('btn-skip').onclick = generer;
    selectLang.onchange = generer;
    selectLevel.onchange = generer;
    window.onload = generer;
</script>
</body>
</html>
