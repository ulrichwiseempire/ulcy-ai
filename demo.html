<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULCY AI - WiseEmpire</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f8f9ff; margin: 0; padding: 20px; }
        .card { width: 100%; max-width: 380px; text-align: center; background: white; border-radius: 36px; padding: 35px 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); position: relative; }
        .score-box { position: absolute; top: 20px; right: 25px; background: #7b61ff; color: white; padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; }
        .brand { font-weight: 800; font-size: 1.8rem; color: #7b61ff; letter-spacing: 3px; margin-bottom: 5px; }
        .sub { color: #888; font-size: 0.7rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        select { width: 100%; padding: 14px; border-radius: 60px; border: 1px solid #eee; margin-bottom: 15px; font-size: 1rem; outline: none; background: #fff; appearance: none; text-align-last: center; }
        .word-box { background: #f9f8ff; border-radius: 25px; padding: 30px 15px; margin-bottom: 25px; min-height: 110px; display: flex; flex-direction: column; justify-content: center; border: 1px solid #f0f0ff; }
        #display-fr { font-size: 1.25rem; font-weight: bold; color: #1a1a1a; margin-bottom: 12px; }
        #display-target { color: #7b61ff; font-weight: 600; font-size: 1.05rem; }
        .btn { width: 100%; padding: 16px; border-radius: 60px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: 0.3s; font-size: 0.95rem; }
        .btn-speak { background: #7b61ff; color: white; box-shadow: 0 4px 15px rgba(123,97,255,0.3); }
        .btn-listen { background: #f0f0ff; color: #7b61ff; }
        .btn-skip { background: transparent; color: #bbb; text-decoration: underline; font-size: 0.8rem; margin-top: 5px; cursor: pointer; border: none; }
        #result { min-height: 45px; margin-top: 15px; font-weight: bold; }
        .success { color: #27ae60; background: #eafaf1; padding: 8px 15px; border-radius: 50px; }
        .error { color: #e74c3c; font-size: 0.85rem; }
        footer { margin-top: 25px; font-size: 0.85rem; color: #bbb; }
        .wise { color: #7b61ff; font-weight: 800; }
    </style>
</head>
<body>

<div class="card">
    <div class="score-box">SCORE: <span id="score">0</span></div>
    <div class="brand">ULCY AI</div>
    <div class="sub">Omni Learning Engine</div>
    
    <select id="lang-select">
        <option value="en-US">🇺🇸 Anglais</option>
        <option value="pt-PT">🇵🇹 Portugais (Portugal)</option>
        <option value="pt-BR">🇧🇷 Portugais (Brésil)</option>
        <option value="it-IT">🇮🇹 Italien</option>
        <option value="es-ES">🇪🇸 Espagnol</option>
        <option value="ru-RU">🇷🇺 Russe</option>
        <option value="de-DE">🇩🇪 Allemand</option>
        <option value="zh-CN">🇨🇳 Chinois</option>
    </select>

    <select id="level-select">
        <option value="débutant">Niveau : Débutant</option>
        <option value="intermédiaire">Niveau : Moyen</option>
        <option value="expert">Niveau : Expert</option>
    </select>

    <div class="word-box">
        <div id="display-fr">Initialisation...</div>
        <div id="display-target">---</div>
    </div>
    
    <button class="btn btn-listen" id="btn-listen">🔊 ÉCOUTER LE MODÈLE</button>
    <button class="btn btn-speak" id="btn-mic">🎙️ PARLER & VÉRIFIER</button>
    <button class="btn-skip" id="btn-skip">Passer cette phrase</button>
    
    <div id="result"></div>
    <footer>Propulsé par <span class="wise">WISEEMPIRE</span></footer>
</div>

<script>
    // ASTUCE CAMOUFLAGE : On coupe la clé en deux pour GitHub
    const part1 = "AIzaSyDHoQ12iizO-";
    const part2 = "BL5mV2P9RkyApfEHcmrFC8";
    const API_KEY = part1 + part2;

    let phraseActuelle = { t: "", fr: "" };
    let score = 0;
    const resDiv = document.getElementById('result');
    const selectLang = document.getElementById('lang-select');
    const selectLevel = document.getElementById('level-select');
    const scoreDisplay = document.getElementById('score');

    async function genererPhraseIA() {
        document.getElementById('display-fr').innerText = "Génération...";
        document.getElementById('display-target').innerText = "---";
        resDiv.innerHTML = "";

        const themes = ["Vente", "Psychologie", "Travail", "Vie quotidienne", "Voyage"];
        const theme = themes[Math.floor(Math.random() * themes.length)];
        const langName = selectLang.options[selectLang.selectedIndex].text;

        const prompt = `Génère une phrase courte en ${langName}. Niveau : ${selectLevel.value}. Thème : ${theme}. Réponds UNIQUEMENT en JSON : {"t": "phrase", "fr": "traduction"}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            const rawText = data.candidates.content.parts.text;
            const cleanJson = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
            phraseActuelle = JSON.parse(cleanJson);
            document.getElementById('display-fr').innerText = phraseActuelle.fr;
            document.getElementById('display-target').innerText = phraseActuelle.t;
        } catch (e) {
            document.getElementById('display-fr').innerText = "Erreur de connexion";
        }
    }

    document.getElementById('btn-listen').onclick = () => {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(phraseActuelle.t);
        u.lang = selectLang.value;
        window.speechSynthesis.speak(u);
    };

    document.getElementById('btn-mic').onclick = () => {
        const Reco = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Reco) return alert("Micro non supporté");
        const r = new Reco();
        r.lang = selectLang.value;
        resDiv.innerHTML = "Écoute...";
        r.onresult = (e) => {
            const dit = e.results.transcript.toLowerCase().trim();
            const cible = phraseActuelle.t.toLowerCase().trim().replace(/[?.!,]/g, '');
            if (dit.includes(cible) || cible.includes(dit)) {
                score += 10;
                scoreDisplay.innerText = score;
                resDiv.innerHTML = "<span class='success'>🎉 BRAVO ! +10 pts</span>";
                setTimeout(genererPhraseIA, 1500);
            } else {
                resDiv.innerHTML = `<span class='error'>Dit : "${dit}"</span>`;
            }
        };
        r.start();
    };

    document.getElementById('btn-skip').onclick = genererPhraseIA;
    selectLang.onchange = genererPhraseIA;
    selectLevel.onchange = genererPhraseIA;
    window.onload = genererPhraseIA;
</script>
</body>
  </html>
