        .word-box { background: #f9f8ff; border-radius: 25px; padding: 30px 15px; margin-bottom: 25px; min-height: 130px; display: flex; flex-direction: column; justify-content: center; border: 1px solid #f0f0ff; }

<body>

<div class="card">
    <div class="score-box">🏆 SCORE: <span id="score">0</span></div>
    <div class="brand">ULCY AI</div>
    <div class="sub">Omni Learning Engine</div>
    
    <select id="lang-select">
        <option value="en-US">🇺🇸 Anglais</option>
        <option value="pt-PT">🇵🇹 Portugais</option>
        <option value="pt-BR">🇧🇷 Portugais (Brésil)</option>
        <option value="it-IT">🇮🇹 Italien</option>
        <option value="es-ES">🇪🇸 Espagnol</option>
        <option value="ru-RU">🇷🇺 Russe</option>
        <option value="de-DE">🇩🇪 Allemand</option>
        <option value="zh-CN">🇨🇳 Chinois</option>
    </select>

    <select id="level-select">
        <option value="debutant">📖 Débutant (phrases simples)</option>
        <option value="intermediaire">📚 Intermédiaire (phrases courantes)</option>
        <option value="expert">🎓 Expert (expressions avancées)</option>
    </select>

    <div class="word-box">
        <div class="label">🇫🇷 EN FRANÇAIS :</div>
        <div id="display-fr">✨ Prêt pour l'entraînement ?</div>
        <div class="label" style="margin-top: 15px;">🗣️ À PRONONCER :</div>
        <div id="display-target">---</div>
    </div>
    
    <button class="btn btn-listen" id="btn-listen">🔊 ÉCOUTER LE MODÈLE</button>
    <button class="btn btn-speak" id="btn-mic">🎙️ PARLER & VÉRIFIER</button>
    <button class="btn-skip" id="btn-skip">⏭️ Passer cette phrase</button>
    
    <div id="result"></div>
    <footer>Propulsé par <span class="wise">WISEEMPIRE</span></footer>
</div>

<script>
    // ============================================
    // BASE DE DONNÉES DE PHRASES (illimitée)
    // ============================================
    
    const PHRASES_DB = {
        "en-US": {
            "debutant": [
                { fr: "Bonjour", target: "Hello" },
                { fr: "Comment ça va ?", target: "How are you?" },
                { fr: "Je m'appelle...", target: "My name is..." },
                { fr: "Merci", target: "Thank you" },
                { fr: "S'il vous plaît", target: "Please" },
                { fr: "Oui", target: "Yes" },
                { fr: "Non", target: "No" },
                { fr: "Je suis heureux", target: "I am happy" },
                { fr: "Quel âge as-tu ?", target: "How old are you?" },
                { fr: "Je viens de France", target: "I come from France" }
            ],
            "intermediaire": [
                { fr: "Pourriez-vous m'aider ?", target: "Could you help me?" },
                { fr: "Je voudrais réserver une table", target: "I would like to book a table" },
                { fr: "À quelle heure ouvre le musée ?", target: "What time does the museum open?" },
                { fr: "Je cherche un bon restaurant", target: "I'm looking for a good restaurant" },
                { fr: "Combien ça coûte ?", target: "How much does it cost?" },
                { fr: "Pouvez-vous parler plus lentement ?", target: "Can you speak more slowly?" },
                { fr: "Je ne comprends pas", target: "I don't understand" },
                { fr: "Où sont les toilettes ?", target: "Where is the bathroom?" },
                { fr: "J'ai une réservation", target: "I have a reservation" },
                { fr: "Quel temps fait-il ?", target: "What's the weather like?" }
            ],
            "expert": [
                { fr: "Je suis ravi de faire votre connaissance", target: "I'm delighted to make your acquaintance" },
                { fr: "Pourriez-vous me recommander un bon vin ?", target: "Could you recommend a good wine?" },
                { fr: "Je suis désolé pour le retard", target: "I apologize for the delay" },
                { fr: "À mon avis, c'est une excellente idée", target: "In my opinion, it's an excellent idea" },
                { fr: "Je n'aurais pas pu mieux dire", target: "I couldn't have said it better" }
            ]
        },
        "es-ES": {
            "debutant": [
                { fr: "Bonjour", target: "Hola" },
                { fr: "Comment ça va ?", target: "¿Cómo estás?" },
                { fr: "Merci", target: "Gracias" },
                { fr: "S'il vous plaît", target: "Por favor" },
                { fr: "Oui", target: "Sí" },
                { fr: "Non", target: "No" }
            ],
            "intermediaire": [
                { fr: "Je voudrais un café", target: "Quisiera un café" },
                { fr: "Où est la gare ?", target: "¿Dónde está la estación?" },
                { fr: "Combien ça coûte ?", target: "¿Cuánto cuesta?" }
            ],
            "expert": [
                { fr: "Je suis enchanté de vous rencontrer", target: "Encantado de conocerle" },
                { fr: "Pourriez-vous m'indiquer le chemin ?", target: "¿Podría indicarme el camino?" }
            ]
        },
        "it-IT": {
            "debutant": [
                { fr: "Bonjour", target: "Buongiorno" },
                { fr: "Comment ça va ?", target: "Come stai?" },
                { fr: "Merci", target: "Grazie" },
                { fr: "S'il vous plaît", target: "Per favore" }
            ],
            "intermediaire": [
                { fr: "Je voudrais une pizza", target: "Vorrei una pizza" },
                { fr: "Où est l'hôtel ?", target: "Dov'è l'hotel?" }
            ],
            "expert": [
                { fr: "Je suis ravi de faire votre connaissance", target: "Sono lieto di fare la tua conoscenza" }
            ]
        },
        "de-DE": {
            "debutant": [
                { fr: "Bonjour", target: "Guten Tag" },
                { fr: "Comment ça va ?", target: "Wie geht es dir?" },
                { fr: "Merci", target: "Danke" }
            ],
            "intermediaire": [
                { fr: "Je voudrais de l'eau", target: "Ich hätte gerne Wasser" },
                { fr: "Parlez-vous anglais ?", target: "Sprechen Sie Englisch?" }
            ],
            "expert": [
                { fr: "Je suis heureux de vous rencontrer", target: "Ich freue mich, Sie kennenzulernen" }
            ]
        }
    };
    
    // Ajouter des phrases par défaut pour les langues sans assez de données
    function getPhrasesForLanguage(lang, level) {
        const langData = PHRASES_DB[lang];
        if (!langData) {
            // Fallback anglais
            return PHRASES_DB["en-US"][level] || PHRASES_DB["en-US"]["intermediaire"];
        }
        const levelData = langData[level];
        if (!levelData || levelData.length === 0) {
            // Fallback débutant si le niveau n'existe pas
            return langData["debutant"] || PHRASES_DB["en-US"]["debutant"];
        }
        return levelData;
    }
    
    let phraseActuelle = { fr: "", target: "" };
    let score = 0;
    let currentPhraseIndex = 0;
    let currentPhrasesList = [];
    
    const resDiv = document.getElementById('result');
    const selectLang = document.getElementById('lang-select');
    const selectLevel = document.getElementById('level-select');
    const scoreDisplay = document.getElementById('score');
    const displayFr = document.getElementById('display-fr');
    const displayTarget = document.getElementById('display-target');

    function cleanText(text) {
        return text.toLowerCase().trim().replace(/[?.!,;:""''()]/g, '').replace(/\s+/g, ' ');
    }

    function calculateSimilarity(userText, targetText) {
        const userWords = cleanText(userText).split(' ');
        const targetWords = cleanText(targetText).split(' ');
        
        let matches = 0;
        for (let word of userWords) {
            if (targetWords.includes(word) && word.length > 2) {
                matches++;
            }
        }
        
        const ratio = targetWords.length > 0 ? matches / targetWords.length : 0;
        return ratio > 0.5;
    }
    
    function updatePhrasesList() {
        const lang = selectLang.value;
        const level = selectLevel.value;
        currentPhrasesList = getPhrasesForLanguage(lang, level);
        
        // Mélanger les phrases pour plus de variété
        for (let i = currentPhrasesList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentPhrasesList[i], currentPhrasesList[j]] = [currentPhrasesList[j], currentPhrasesList[i]];
        }
        
        currentPhraseIndex = 0;
        console.log(`📚 Chargé ${currentPhrasesList.length} phrases pour ${lang} niveau ${level}`);
        return currentPhrasesList.length > 0;
    }
    
    function afficherPhraseSuivante() {
        if (currentPhrasesList.length === 0) {
            if (!updatePhrasesList()) {
                displayFr.innerText = "❌ Aucune phrase disponible";
                displayTarget.innerText = "---";
                return false;
            }
        }
        
        if (currentPhraseIndex >= currentPhrasesList.length) {
            // On a fait le tour, on recharge et mélange
            updatePhrasesList();
        }
        
        phraseActuelle = currentPhrasesList[currentPhraseIndex];
        displayFr.innerText = phraseActuelle.fr;
        displayTarget.innerText = phraseActuelle.target;
        resDiv.innerHTML = "";
        
        console.log(`🔄 Phrase ${currentPhraseIndex + 1}/${currentPhrasesList.length}: ${phraseActuelle.target}`);
        
        currentPhraseIndex++;
        return true;
    }
    
    async function genererNouvellePhrase() {
        // Version simple avec les phrases intégrées
        afficherPhraseSuivante();
        
        // Envoi à Google Analytics
        if (typeof gtag !== 'undefined') {
            gtag('event', 'phrase_generated', {
                'language': selectLang.value,
                'level': selectLevel.value
            });
        }
    }

    document.getElementById('btn-listen').onclick = () => {
        if (!phraseActuelle.target) return;
        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(phraseActuelle.target);
        utterance.lang = selectLang.value;
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
        
        if (typeof gtag !== 'undefined') {
            gtag('event', 'listen', { 'language': selectLang.value });
        }
    };

    document.getElementById('btn-mic').onclick = () => {
        if (!phraseActuelle.target) {
            resDiv.innerHTML = "<span class='error'>Chargement...</span>";
            return;
        }
        
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) {
            resDiv.innerHTML = "<span class='error'>❌ Micro non supporté</span>";
            return;
        }
        
        const recognizer = new Recognition();
        recognizer.lang = selectLang.value;
        recognizer.interimResults = false;
        
        resDiv.innerHTML = '<span class="loading">🎤 Parle maintenant...</span>';
        
        recognizer.onresult = (event) => {
            const spoken = event.results[0][0].transcript;
            const target = phraseActuelle.target;
            
            const isCorrect = calculateSimilarity(spoken, target);
            
            if (isCorrect) {
                score += 10;
                scoreDisplay.innerText = score;
                resDiv.innerHTML = `<span class='success'>🎉 BRAVO ! +10 points (Total: ${score} pts)</span>`;
                
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'correct_answer', {
                        'language': selectLang.value,
                        'score': score
                    });
                }
                
                // Change automatiquement de phrase après une bonne réponse
                setTimeout(() => genererNouvellePhrase(), 1500);
            } else {
                resDiv.innerHTML = `<span class='error'>📝 Tu as dit : "${spoken}"<br>💡 Attendu : "${target}"</span>`;
                
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'wrong_answer', { 'language': selectLang.value });
                }
            }
        };
        
        recognizer.onerror = (event) => {
            resDiv.innerHTML = `<span class='error'>❌ Erreur micro : ${event.error}</span>`;
        };
        
        recognizer.start();
    };

    document.getElementById('btn-skip').onclick = () => {
        genererNouvellePhrase();
        if (typeof gtag !== 'undefined') {
            gtag('event', 'skip_phrase');
        }
    };
    
    selectLang.onchange = () => {
        updatePhrasesList();
        genererNouvellePhrase();
        if (typeof gtag !== 'undefined') {
            gtag('event', 'language_changed', { 'language': selectLang.value });
        }
    };
    
    selectLevel.onchange = () => {
        updatePhrasesList();
        genererNouvellePhrase();
        if (typeof gtag !== 'undefined') {
            gtag('event', 'level_changed', { 'level': selectLevel.value });
        }
    };
    
    // Démarrer
    window.onload = () => {
        updatePhrasesList();
        genererNouvellePhrase();
    };
</script>
</body>
