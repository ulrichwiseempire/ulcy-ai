<!DOCTYPE html>
<html lang="fr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8SZEW3KEXH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8SZEW3KEXH');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULCY AI Pro</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #fafaff; margin: 0; padding: 20px; }
        .card { width: 100%; max-width: 380px; text-align: center; background: white; border-radius: 36px; padding: 32px 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid #f0eef7; }
        .brand { font-weight: 800; font-size: 1.8rem; letter-spacing: 3px; margin-bottom: 8px; background: linear-gradient(135deg, #7b61ff, #9b7eff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sub { color: #7b7c9e; font-size: 0.75rem; margin-bottom: 28px; letter-spacing: 1px; text-transform: uppercase; }
        select { width: 100%; padding: 14px 16px; border-radius: 60px; margin-bottom: 20px; border: 1px solid #e2e0f0; background: white; font-size: 1rem; font-weight: 500; cursor: pointer; outline: none; }
        .word-box { background: #f9f8ff; border-radius: 32px; padding: 28px 16px; margin: 16px 0 28px; }
        #display-fr { font-size: 1.35rem; font-weight: 700; color: #1e1a3c; margin-bottom: 12px; }
        #display-target { font-size: 1.1rem; color: #7b61ff; font-weight: 500; background: #ffffffcc; padding: 6px 16px; border-radius: 60px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 60px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-speak { background: #7b61ff; color: white; box-shadow: 0 8px 20px rgba(123,97,255,0.25); }
        .btn-listen { background: #f4f2ff; color: #7b61ff; border: 1px solid #e5dfff; }
        #result { margin-top: 20px; min-height: 40px; }
        .success { color: #0f7b3a; background: #e2f7ea; padding: 8px 18px; border-radius: 60px; font-weight: 600; animation: bounce 0.5s; }
        .error { color: #bc3f2e; background: #ffe8e5; padding: 8px 18px; border-radius: 60px; font-size: 0.85rem; }
        footer { font-size: 0.75rem; color: #aaa9c4; margin-top: 30px; font-weight: 500; }
        .brand-footer { color: #7b61ff; font-weight: 700; text-decoration: none; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .mic-loading { animation: pulse 1s infinite; background: #a18eff; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">ULCY AI</div>
    <div class="sub">Omni Learning Engine</div>
    <select id="lang-select"></select>
    <div class="word-box">
        <div id="display-fr">Chargement...</div>
        <div id="display-target">—</div>
    </div>
    <div class="btn-group">
        <button class="btn btn-listen" id="btn-listen">🔊 ÉCOUTER LE MODÈLE</button>
        <button class="btn btn-speak" id="btn-mic">🎙️ PARLER & VÉRIFIER</button>
    </div>
    <div id="result"></div>
    <footer>Écosystème <span class="brand-footer">WiseEmpire</span></footer>
</div>

<script>
    const banques = {
        "en-US": [
            { t: "Nice to meet you", fr: "Enchanté de vous rencontrer" },
            { t: "I need some help", fr: "J'ai besoin d'aide" },
            { t: "How's your day going?", fr: "Comment se passe ta journée ?" },
            { t: "Let's make a deal", fr: "Concluons un accord" },
            { t: "Believe in yourself", fr: "Crois en toi" }
        ],
        "pt-PT": [
            { t: "Quanto custa?", fr: "Combien ça coûte ?" },
            { t: "É um prazer", fr: "C'est un plaisir" },
            { t: "O mercado é grande", fr: "Le marché est grand" },
            { t: "Bom dia", fr: "Bonjour" },
            { t: "Obrigado", fr: "Merci" }
        ],
        "es-ES": [
            { t: "Hola, ¿cómo estás?", fr: "Salut, comment vas-tu ?" },
            { t: "Es una buena oferta", fr: "C'est une bonne offre" },
            { t: "¿Dónde está le éxito?", fr: "Où se trouve le succès ?" },
            { t: "Muchas gracias", fr: "Merci beaucoup" }
        ],
        "zh-CN": [
            { t: "你好", fr: "Bonjour" },
            { t: "谢谢", fr: "Merci" },
            { t: "太贵了", fr: "C'est trop cher" },
            { t: "我要这个", fr: "Je veux celui-là" }
        ]
        // Tu peux rajouter les autres langues ici sur le même modèle
    };

    const nomsLangues = {
        "en-US": "🇺🇸 Anglais (US)",
        "pt-PT": "🇵🇹 Portugais (PT)",
        "es-ES": "🇪🇸 Espagnol",
        "zh-CN": "🇨🇳 Chinois"
    };

    let phraseActuelle = {};
    const selectLang = document.getElementById('lang-select');
    const displayFr = document.getElementById('display-fr');
    const displayTarget = document.getElementById('display-target');
    const resultDiv = document.getElementById('result');
    const btnMic = document.getElementById('btn-mic');
    const btnListen = document.getElementById('btn-listen');

    for (let code in banques) {
        selectLang.add(new Option(nomsLangues[code] || code, code));
    }

    function nouvellePhrase() {
        const phrases = banques[selectLang.value];
        phraseActuelle = phrases[Math.floor(Math.random() * phrases.length)];
        displayFr.innerText = phraseActuelle.fr;
        displayTarget.innerText = phraseActuelle.t;
        resultDiv.innerHTML = "";
    }

    function ecouter() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(phraseActuelle.t);
        u.lang = selectLang.value;
        window.speechSynthesis.speak(u);
    }

    function verifier() {
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) return alert("Navigateur non compatible");

        const rec = new Recognition();
        rec.lang = selectLang.value;
        btnMic.classList.add("mic-loading");
        btnMic.innerText = "🎙️ ÉCOUTE...";

        rec.onresult = (e) => {
            const dit = e.results.transcript.toLowerCase().replace(/[^\w\s]/g, '').trim();
            const cible = phraseActuelle.t.toLowerCase().replace(/[^\w\s]/g, '').trim();

            if (dit.includes(cible) || cible.includes(dit)) {
                resultDiv.innerHTML = "<span class='success'>🎉 BRAVO ! PASSAGE AU SUIVANT...</span>";
                if(typeof gtag === 'function') gtag('event', 'success', {'lang': selectLang.value});
                setTimeout(nouvellePhrase, 2000);
            } else {
                resultDiv.innerHTML = `<span class='error'>✖️ Tu as dit : "${e.results.transcript}"</span>`;
            }
        };

        rec.onend = () => {
            btnMic.classList.remove("mic-loading");
            btnMic.innerText = "🎙️ PARLER & VÉRIFIER";
        };
        rec.start();
    }

    selectLang.onchange = nouvellePhrase;
    btnListen.onclick = ecouter;
    btnMic.onclick = verifier;
    window.onload = nouvellePhrase;
</script>
</body>
</html>
