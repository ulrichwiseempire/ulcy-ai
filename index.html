<script>
    // ON UTILISE UN OBJET LOCAL AU LIEU D'UN FICHIER JSON EXTERNE (PLUS FIABLE)
    const banques = {
        "en-US": [
            { t: "Success is a journey", fr: "Le succès est un voyage" },
            { t: "Digital transformation", fr: "Transformation digitale" },
            { t: "Sustainable income", fr: "Revenu durable (Fric durable)" },
            { t: "Nice to meet you", fr: "Enchanté" },
            { t: "Business automation", fr: "Automatisation d'entreprise" }
        ],
        "pt-PT": [
            { t: "Bom dia", fr: "Bonjour" },
            { t: "Quanto custa?", fr: "Combien ça coûte ?" },
            { t: "Obrigado", fr: "Merci" },
            { t: "É um prazer", fr: "C'est un plaisir" }
        ],
        "es-ES": [
            { t: "Hola", fr: "Salut" },
            { t: "Es una buena oferta", fr: "C'est une bonne offre" },
            { t: "Muchas gracias", fr: "Merci beaucoup" }
        ],
        "zh-CN": [
            { t: "你好", fr: "Bonjour" },
            { t: "谢谢", fr: "Merci" },
            { t: "再见", fr: "Au revoir" }
        ]
    };

    const nomsLangues = {
        "en-US": "🇺🇸 Anglais (US)",
        "pt-PT": "🇵🇹 Portugais (PT)",
        "es-ES": "🇪🇸 Espagnol",
        "zh-CN": "🇨🇳 Chinois"
    };

    let phraseActuelle = {};
    const selectLang = document.getElementById('lang-select');
    const displayFr = document.getElementById('display-fr');
    const displayTarget = document.getElementById('display-target');
    const resultDiv = document.getElementById('result');
    const btnMic = document.getElementById('btn-mic');

    // Remplir le menu
    for (let code in banques) {
        selectLang.add(new Option(nomsLangues[code], code));
    }

    function nouvellePhrase() {
        const phrases = banques[selectLang.value];
        phraseActuelle = phrases[Math.floor(Math.random() * phrases.length)];
        displayFr.innerText = phraseActuelle.fr;
        displayTarget.innerText = phraseActuelle.t;
        resultDiv.innerHTML = "";
    }

    function verifier() {
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) return;

        const rec = new Recognition();
        rec.lang = selectLang.value;
        btnMic.innerText = "🎙️ ÉCOUTE...";
        
        rec.onresult = (e) => {
            const dit = e.results.transcript.toLowerCase().trim();
            const cible = phraseActuelle.t.toLowerCase().trim();

            // Vérification simplifiée pour éviter les blocages
            if (dit.includes(cible.replace(/[?.!,]/g, '')) || cible.includes(dit)) {
                resultDiv.innerHTML = "<span class='success'>🎉 BRAVO ! PASSAGE AU SUIVANT...</span>";
                setTimeout(nouvellePhrase, 1500);
            } else {
                resultDiv.innerHTML = `<span class='error'>✖️ Tu as dit : "${e.results.transcript}"</span>`;
            }
        };

        rec.onend = () => { btnMic.innerText = "🎙️ PARLER & VÉRIFIER"; };
        rec.start();
    }

    selectLang.onchange = nouvellePhrase;
    document.getElementById('btn-listen').onclick = () => {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(phraseActuelle.t);
        u.lang = selectLang.value;
        window.speechSynthesis.speak(u);
    };
    btnMic.onclick = verifier;
    window.onload = nouvellePhrase;
</script>
